<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Defect Detection</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .sub {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .feed-wrap {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      max-width: 100%;
      display: inline-block;
    }
    .feed-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .status {
      margin-top: 1rem;
      padding: 0.5rem 0.75rem;
      background: #2a2a2a;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .controls {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .controls button {
      padding: 0.5rem 1.25rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .controls button.start {
      background: #22c55e;
      color: #fff;
    }
    .controls button.start:hover { background: #16a34a; }
    .controls button.stop {
      background: #ef4444;
      color: #fff;
    }
    .controls button.stop:hover { background: #dc2626; }
    .analysis-status {
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .analysis-status.on { color: #22c55e; }
    .analysis-status.off { color: #64748b; }
  </style>
</head>
<body>
  <h1>Live Defect Detection</h1>
  <p class="sub">Raspberry Pi 5 — camera feed. Start analysis to run detection and log defects.</p>

  <div class="feed-wrap">
    <img src="/video_feed" alt="Live camera feed" />
  </div>

  <div class="controls">
    <button class="start" type="button" id="btn-start">Start analysis</button>
    <button class="stop" type="button" id="btn-stop">Stop analysis</button>
    <span class="analysis-status off" id="analysis-status">Analysis: off — plain livestream</span>
  </div>

  <p class="status">Start = defect detection + bounding boxes + console logging. Stop = normal livestream only.</p>

  <script>
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const statusEl = document.getElementById('analysis-status');

    function setAnalysis(enabled) {
      fetch('/api/analysis?enabled=' + (enabled ? '1' : '0'))
        .then(r => r.json())
        .then(data => {
          statusEl.textContent = data.analysis ? 'Analysis: on — detecting & logging' : 'Analysis: off — plain livestream';
          statusEl.className = 'analysis-status ' + (data.analysis ? 'on' : 'off');
        })
        .catch(() => { statusEl.textContent = 'Error'; });
    }

    btnStart.addEventListener('click', () => setAnalysis(true));
    btnStop.addEventListener('click', () => setAnalysis(false));
  </script>
</body>
</html>
